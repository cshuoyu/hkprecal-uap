# @package _global_
# Default Hydra config for root2csv (KOR charge).

# -----------------------------------------------------------------------------
# Hydra configuration.
# -----------------------------------------------------------------------------
hydra:
  run:
    dir: ${oc.env:UAP_HOME,.}/outputs/${now:%Y-%m-%d}/${now:%H-%M-%S}-root2csv-${system}
  job:
    chdir: true

# -----------------------------------------------------------------------------
# Input dataset.
# -----------------------------------------------------------------------------
system: kor
input_dir: /path/to/your/root/outputs
serial: EL1635B

# -----------------------------------------------------------------------------
# Fit configuration.
# -----------------------------------------------------------------------------
fit_method: fitandplot_kor_charge
max_files: 0

# -----------------------------------------------------------------------------
# Channel configuration
# -----------------------------------------------------------------------------
channel: auto
trigger_ch: auto

# -----------------------------------------------------------------------------
# Charge fit configuration
# -----------------------------------------------------------------------------
charge_branch: pico
charge_fit_range: [-2.0, 6.0]
inc_backscatter: true
